version: '3.8'

services:
  frp-panel:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: frp-panel
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./data:/app/data
      - ./config.yaml:/app/config.yaml
    environment:
      - TZ=Asia/Shanghai

