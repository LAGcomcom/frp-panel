<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FRP Panel 授权激活</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; padding: 24px; color: #1f2328; background: #f6f8fa; font: 14px/1.5 system-ui, sans-serif; }
    main { width: min(400px, 100%); padding: 32px; background: #fff; border: 1px solid #d1d9e0; border-radius: 8px; box-shadow: 0 8px 24px rgba(27,31,36,.08); }
    h1 { margin: 0 0 6px; font-size: 20px; }
    p { margin: 0 0 24px; color: #656d76; }
    label { display: block; margin-bottom: 6px; font-weight: 600; }
    input, button { width: 100%; height: 42px; border-radius: 6px; font: inherit; }
    input { padding: 0 12px; border: 1px solid #d1d9e0; }
    input:focus { border-color: #0969da; outline: 3px solid rgba(9,105,218,.15); }
    button { margin-top: 14px; border: 0; color: #fff; background: #1f883d; font-weight: 600; cursor: pointer; }
    button:disabled { opacity: .6; cursor: wait; }
    #message, .device { margin-top: 16px; padding: 10px 12px; border-radius: 6px; background: #f6f8fa; word-break: break-all; }
    #message:empty { display: none; }
    #message.error { color: #cf222e; background: #ffebe9; }
    #message.success { color: #1a7f37; background: #dafbe1; }
    .device { color: #656d76; font-size: 12px; }
  </style>
</head>
<body>
  <main>
    <h1>FRP Panel 授权激活</h1>
    <p>输入授权码以激活此面板实例。</p>
    <form id="form">
      <label for="licenseKey">授权码</label>
      <input id="licenseKey" name="licenseKey" autocomplete="off" required placeholder="AUTH-XXXX-XXXX-XXXX-XXXX">
      <button id="submit" type="submit">激活授权</button>
    </form>
    <div id="message" role="status"></div>
    <div class="device">设备 ID：<span id="deviceId">加载中...</span></div>
  </main>
  <script>
    const message = document.getElementById('message');
    const submit = document.getElementById('submit');
    fetch('/api/license/device-id').then(r => r.json()).then(r => {
      if (r.code === 0) document.getElementById('deviceId').textContent = r.data.device_id;
    }).catch(() => { document.getElementById('deviceId').textContent = '获取失败'; });
    fetch('/api/license/status').then(r => r.json()).then(r => {
      if (r.code === 0 && r.data.active) location.href = '/admin';
    });
    document.getElementById('form').addEventListener('submit', async event => {
      event.preventDefault();
      submit.disabled = true;
      submit.textContent = '激活中...';
      message.className = '';
      message.textContent = '';
      try {
        const response = await fetch('/api/license/activate', {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ license_key: document.getElementById('licenseKey').value.trim() })
        });
        const result = await response.json();
        if (result.code !== 0) throw new Error(result.message || result.error || '激活失败');
        message.className = 'success';
        message.textContent = '授权已激活，正在进入管理面板...';
        setTimeout(() => { location.href = '/admin'; }, 1000);
      } catch (error) {
        message.className = 'error';
        message.textContent = error.message || '网络错误，请稍后重试';
        submit.disabled = false;
        submit.textContent = '激活授权';
      }
    });
  </script>
</body>
</html>
